<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Inicio | Proyecto Tailwind</title>
    <meta name="description" content="Página principal del proyecto con Tailwind CSS. Diseño moderno, responsive y SEO optimizado." />
    <meta name="keywords" content="Tailwind, SEO, Responsive, Moderno, HTML, CSS" />
    <meta name="author" content="4GeeksAcademy" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>
  </head>
  <body class="bg-blanco-caldo min-h-screen flex flex-col">
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
    <main class="flex-1 flex flex-col items-center justify-center px-4">
      <!-- Hero vacío temporalmente -->
    </main>
    <!-- Footer -->
    <div id="footer-placeholder"></div>
    <script>
      // Cargar navbar y footer
      fetch('navbar.html').then(r => r.text()).then(html => { document.getElementById('navbar-placeholder').innerHTML = html; });
      fetch('footer.html').then(r => r.text()).then(html => { document.getElementById('footer-placeholder').innerHTML = html; });
    </script>
    <script src="functions.js" defer></script>
  </body>
</html>
